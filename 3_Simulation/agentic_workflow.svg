<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#0b0f19;font-family:Inter,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="600">Delivery Pilot Template — Agentic Workflow</text>

  <!-- Agents row 1 -->
  <rect x="40" y="50" width="100" height="60" rx="8" fill="#8b5cf6" opacity="0.9"/>
  <text x="90" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Real Agent</text>
  <text x="90" y="90" text-anchor="middle" fill="#ddd" font-size="7">1_Real_Unknown</text>
  <text x="90" y="102" text-anchor="middle" fill="#c4b5fd" font-size="6">Coordinator</text>

  <rect x="175" y="50" width="100" height="60" rx="8" fill="#06b6d4" opacity="0.9"/>
  <text x="225" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Env. Agent</text>
  <text x="225" y="90" text-anchor="middle" fill="#ddd" font-size="7">2_Environment</text>
  <text x="225" y="102" text-anchor="middle" fill="#a5f3fc" font-size="6">Tools/Blueprints</text>

  <rect x="310" y="50" width="100" height="60" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="360" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Sim. Agent</text>
  <text x="360" y="90" text-anchor="middle" fill="#ddd" font-size="7">3_Simulation</text>
  <text x="360" y="102" text-anchor="middle" fill="#a7f3d0" font-size="6">Visual Designs</text>

  <rect x="445" y="50" width="100" height="60" rx="8" fill="#f59e0b" opacity="0.9"/>
  <text x="495" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Form. Agent</text>
  <text x="495" y="90" text-anchor="middle" fill="#ddd" font-size="7">4_Formula</text>
  <text x="495" y="102" text-anchor="middle" fill="#fde68a" font-size="6">Specs + Approval</text>

  <rect x="580" y="50" width="100" height="60" rx="8" fill="#ef4444" opacity="0.9"/>
  <text x="630" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Sym. Agent</text>
  <text x="630" y="90" text-anchor="middle" fill="#ddd" font-size="7">5_Symbols</text>
  <text x="630" y="102" text-anchor="middle" fill="#fecaca" font-size="6">Code</text>

  <!-- Agents row 2 -->
  <rect x="310" y="160" width="100" height="60" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="360" y="184" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Test Agent</text>
  <text x="360" y="200" text-anchor="middle" fill="#ddd" font-size="7">7_Testing_Known</text>
  <text x="360" y="212" text-anchor="middle" fill="#bfdbfe" font-size="6">Smoke/Code Review</text>

  <rect x="445" y="160" width="100" height="60" rx="8" fill="#ec4899" opacity="0.9"/>
  <text x="495" y="184" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Sem. Agent</text>
  <text x="495" y="200" text-anchor="middle" fill="#ddd" font-size="7">6_Semblance</text>
  <text x="495" y="212" text-anchor="middle" fill="#fbcfe8" font-size="6">Fix + Lessons</text>

  <!-- Arrows: horizontal flow (row 1) -->
  <line x1="140" y1="80" x2="172" y2="80" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="275" y1="80" x2="307" y2="80" stroke="#475569" stroke-width="1.5"/>
  <line x1="410" y1="80" x2="442" y2="80" stroke="#475569" stroke-width="1.5"/>
  <line x1="545" y1="80" x2="577" y2="80" stroke="#475569" stroke-width="1.5"/>

  <!-- Arrow: Symbols → Test (down) -->
  <line x1="630" y1="110" x2="630" y2="145" stroke="#475569" stroke-width="1.5"/>
  <line x1="630" y1="145" x2="410" y2="145" stroke="#475569" stroke-width="1.5"/>
  <line x1="410" y1="145" x2="410" y2="157" stroke="#475569" stroke-width="1.5"/>

  <!-- Arrow: Test → Semblance -->
  <line x1="410" y1="190" x2="442" y2="190" stroke="#475569" stroke-width="1.5"/>

  <!-- Arrow: Semblance → Real (feedback loop) -->
  <line x1="495" y1="160" x2="495" y2="130" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="495" y1="130" x2="90" y2="130" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="90" y1="130" x2="90" y2="112" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="295" y="124" text-anchor="middle" fill="#ec4899" font-size="6">feedback loop — lessons learned</text>

  <!-- Thinking Log Hub -->
  <rect x="100" y="280" width="600" height="40" rx="8" fill="#1e293b" opacity="0.8" stroke="#334155" stroke-width="1"/>
  <text x="400" y="304" text-anchor="middle" fill="#94a3b8" font-size="10">llm_thinking_log.md — Agent Communication Hub</text>

  <!-- Lines from agents to thinking log -->
  <line x1="90" y1="280" x2="90" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="1,2"/>
  <line x1="225" y1="280" x2="225" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="1,2"/>
  <line x1="360" y1="280" x2="360" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="1,2"/>
  <line x1="495" y1="280" x2="495" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="1,2"/>
  <line x1="630" y1="280" x2="630" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="1,2"/>

  <!-- Self-Learning description -->
  <text x="400" y="350" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">Self-Learning Through Agentic Feedback</text>
  <text x="400" y="370" text-anchor="middle" fill="#94a3b8" font-size="8">Every error → documented fix → lessons learned → risks updated → system improves</text>
  <text x="400" y="386" text-anchor="middle" fill="#64748b" font-size="7">Test finds → Semblance fixes → creates sub-agents → Real Agent coordinates → cycle repeats smarter</text>

  <!-- Footer -->
  <text x="400" y="420" text-anchor="middle" fill="#475569" font-size="7">rifaterdemsahin.github.io/delivery-pilot-template</text>
</svg>
